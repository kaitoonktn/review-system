<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>レビュー生成ツール</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <style>
    /* ── リセット & ベース ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f0f13;
      --surface:   #1a1a22;
      --surface2:  #22222e;
      --border:    #2e2e3e;
      --accent:    #7c6af7;
      --accent2:   #e46baa;
      --text:      #e8e8f0;
      --text-sub:  #8888aa;
      --success:   #52c497;
      --radius:    16px;
      --shadow:    0 8px 32px rgba(0,0,0,0.5);
    }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 80px;
    }

    /* ── ヘッダー ── */
    header {
      background: linear-gradient(135deg, #1a1030 0%, #0f0f1a 60%);
      padding: 36px 20px 28px;
      text-align: center;
      border-bottom: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }
    header::before {
      content: '';
      position: absolute;
      top: -60px; left: 50%; transform: translateX(-50%);
      width: 320px; height: 320px;
      background: radial-gradient(circle, rgba(124,106,247,0.18) 0%, transparent 70%);
      pointer-events: none;
    }
    .header-emoji { font-size: 2.2rem; display: block; margin-bottom: 8px; }
    header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.7rem;
      letter-spacing: 0.02em;
      background: linear-gradient(90deg, #b8a9ff, #f09fce);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    header p {
      color: var(--text-sub);
      font-size: 0.82rem;
      margin-top: 6px;
    }

    /* ── メインコンテナ ── */
    main { max-width: 540px; margin: 0 auto; padding: 24px 16px 0; }

    /* ── カード ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px 18px;
      margin-bottom: 16px;
    }
    .card-title {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 14px;
    }

    /* ── フォーム要素 ── */
    label { display: block; font-size: 0.85rem; color: var(--text-sub); margin-bottom: 6px; }

    input[type="text"],
    textarea,
    select {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 0.95rem;
      padding: 12px 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      -webkit-appearance: none;
    }
    input[type="text"]:focus,
    textarea:focus,
    select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(124,106,247,0.18);
    }
    textarea { resize: vertical; min-height: 130px; line-height: 1.7; }
    select { cursor: pointer; }

    .form-group { margin-bottom: 18px; }
    .form-group:last-child { margin-bottom: 0; }

    .hint {
      font-size: 0.74rem;
      color: var(--text-sub);
      margin-top: 5px;
      line-height: 1.5;
    }
    .hint span {
      display: inline-block;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0 5px;
      font-size: 0.7rem;
      color: var(--accent2);
    }

    /* ── 選択グリッド（スタイル / フォーマット） ── */
    .select-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .select-btn {
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      color: var(--text-sub);
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 0.78rem;
      padding: 10px 6px;
      text-align: center;
      cursor: pointer;
      transition: all 0.18s;
      line-height: 1.4;
      -webkit-tap-highlight-color: transparent;
    }
    .select-btn .btn-icon { font-size: 1.3rem; display: block; margin-bottom: 3px; }
    .select-btn:hover  { border-color: var(--accent); color: var(--text); }
    .select-btn.active {
      background: rgba(124,106,247,0.15);
      border-color: var(--accent);
      color: var(--text);
    }

    /* ── 生成ボタン ── */
    .generate-btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: var(--radius);
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
      position: relative;
      overflow: hidden;
    }
    .generate-btn:active { transform: scale(0.98); opacity: 0.9; }
    .generate-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .generate-btn .btn-spinner {
      display: none;
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto;
    }
    .generate-btn.loading .btn-text   { display: none; }
    .generate-btn.loading .btn-spinner { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── エラー ── */
    .error-box {
      display: none;
      background: rgba(228, 107, 107, 0.12);
      border: 1px solid rgba(228, 107, 107, 0.4);
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 0.85rem;
      color: #f09090;
      margin-bottom: 14px;
    }
    .error-box.show { display: block; }

    /* ── 結果カード ── */
    .result-card {
      display: none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 16px;
      animation: slideUp 0.35s ease;
    }
    .result-card.show { display: block; }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .result-header {
      background: linear-gradient(135deg, rgba(124,106,247,0.2), rgba(228,107,170,0.2));
      padding: 16px 18px;
      border-bottom: 1px solid var(--border);
    }
    .result-meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }
    .badge {
      font-size: 0.72rem;
      padding: 3px 9px;
      border-radius: 20px;
      font-weight: 500;
    }
    .badge-stars  { background: rgba(255,210,80,0.15); color: #ffd250; border: 1px solid rgba(255,210,80,0.3); }
    .badge-period { background: rgba(82,196,151,0.12); color: var(--success); border: 1px solid rgba(82,196,151,0.3); }
    .badge-style  { background: rgba(124,106,247,0.12); color: #b8a9ff; border: 1px solid rgba(124,106,247,0.3); }

    .result-title {
      font-size: 0.95rem;
      font-weight: 700;
      line-height: 1.5;
      color: var(--text);
    }

    .result-body {
      padding: 18px 18px;
      font-size: 0.88rem;
      line-height: 1.9;
      color: #cccce0;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .result-actions {
      padding: 0 18px 18px;
      display: flex;
      gap: 10px;
    }
    .action-btn {
      flex: 1;
      padding: 11px;
      border-radius: 10px;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: all 0.18s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-copy {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
    }
    .btn-copy:hover  { border-color: var(--accent); }
    .btn-copy.copied { border-color: var(--success); color: var(--success); }
    .btn-regen {
      background: rgba(124,106,247,0.15);
      border: 1px solid rgba(124,106,247,0.4);
      color: #b8a9ff;
    }
    .btn-regen:hover { background: rgba(124,106,247,0.25); }

    /* ── フッター ── */
    footer {
      text-align: center;
      padding: 32px 16px 0;
      color: var(--text-sub);
      font-size: 0.75rem;
    }
  </style>
</head>
<body>

<header>
  <span class="header-emoji">🛍️</span>
  <h1>Review Generator</h1>
  <p>商品名とポイントを入力するだけでレビューを自動生成</p>
</header>

<main>

  <!-- エラー表示 -->
  <div class="error-box" id="errorBox"></div>

  <!-- 入力フォーム -->
  <div class="card">
    <div class="card-title">商品情報</div>

    <div class="form-group">
      <label for="productName">商品名</label>
      <input type="text" id="productName" placeholder="例：ワイヤレスイヤホン XZ-100" autocomplete="off">
    </div>

    <div class="form-group">
      <label for="points">レビューポイント</label>
      <textarea id="points" placeholder="例：
音質がクリアで低音もしっかり出る
連続8時間再生でバッテリーが長持ち
装着感が軽くて長時間でも疲れない
ケースが少し大きくて惜しい"></textarea>
      <p class="hint">
        1行1ポイントで入力。<span>惜しい</span><span>重い</span><span>高い</span>などネガティブワードを含む行は「気になる点」段落に自動分類されます。
      </p>
    </div>
  </div>

  <!-- スタイル選択 -->
  <div class="card">
    <div class="card-title">スタイル</div>
    <div class="select-grid" id="styleGrid">
      <button class="select-btn" data-value="1">
        <span class="btn-icon">🎩</span>丁寧
      </button>
      <button class="select-btn active" data-value="2">
        <span class="btn-icon">😊</span>カジュアル
      </button>
      <button class="select-btn" data-value="3">
        <span class="btn-icon">📱</span>SNS用
      </button>
    </div>
  </div>

  <!-- フォーマット選択 -->
  <div class="card">
    <div class="card-title">フォーマット</div>
    <div class="select-grid" id="formatGrid">
      <button class="select-btn active" data-value="1">
        <span class="btn-icon">📦</span>Amazon風
      </button>
      <button class="select-btn" data-value="2">
        <span class="btn-icon">🛒</span>楽天風
      </button>
      <button class="select-btn" data-value="3">
        <span class="btn-icon">📝</span>ブログ風
      </button>
    </div>
  </div>

  <!-- 生成ボタン -->
  <button class="generate-btn" id="generateBtn" onclick="generateReview()">
    <span class="btn-text">✨ レビューを生成する</span>
    <span class="btn-spinner"></span>
  </button>

  <!-- 結果表示 -->
  <div class="result-card" id="resultCard">
    <div class="result-header">
      <div class="result-meta">
        <span class="badge badge-stars"  id="resultStars"></span>
        <span class="badge badge-period" id="resultPeriod"></span>
        <span class="badge badge-style"  id="resultStyle"></span>
      </div>
      <div class="result-title" id="resultTitle"></div>
    </div>
    <div class="result-body" id="resultBody"></div>
    <div class="result-actions">
      <button class="action-btn btn-copy" id="copyBtn" onclick="copyReview()">📋 コピー</button>
      <button class="action-btn btn-regen" onclick="generateReview()">🔄 再生成</button>
    </div>
  </div>

  <footer>Review Generator v3 &nbsp;·&nbsp; Powered by Flask + Python</footer>

</main>

<script>
  // ── 選択ボタンの排他制御 ──
  function initSelectGroup(gridId) {
    const grid = document.getElementById(gridId);
    grid.querySelectorAll('.select-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        grid.querySelectorAll('.select-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      });
    });
  }
  initSelectGroup('styleGrid');
  initSelectGroup('formatGrid');

  function getSelected(gridId) {
    const active = document.querySelector(`#${gridId} .select-btn.active`);
    return active ? active.dataset.value : '1';
  }

  // ── レビュー生成 ──
  async function generateReview() {
    const btn       = document.getElementById('generateBtn');
    const errorBox  = document.getElementById('errorBox');
    const resultCard = document.getElementById('resultCard');

    const productName = document.getElementById('productName').value.trim();
    const points      = document.getElementById('points').value.trim();
    const style       = getSelected('styleGrid');
    const format      = getSelected('formatGrid');

    // エラーリセット
    errorBox.classList.remove('show');

    // ローディング開始
    btn.classList.add('loading');
    btn.disabled = true;

    try {
      const res = await fetch('/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ product_name: productName, points, style, format }),
      });

      const data = await res.json();

      if (!res.ok) {
        showError(data.error || '生成に失敗しました');
        return;
      }

      // 結果を表示
      document.getElementById('resultStars').textContent  = data.stars;
      document.getElementById('resultPeriod').textContent = data.period;
      document.getElementById('resultStyle').textContent  = data.style;
      document.getElementById('resultTitle').textContent  = data.title;
      document.getElementById('resultBody').textContent   = data.body;

      // コピーボタンをリセット
      const copyBtn = document.getElementById('copyBtn');
      copyBtn.textContent = '📋 コピー';
      copyBtn.classList.remove('copied');

      // カード表示（再アニメーションのためいったん非表示）
      resultCard.classList.remove('show');
      void resultCard.offsetWidth; // reflow
      resultCard.classList.add('show');

      // スクロール
      setTimeout(() => resultCard.scrollIntoView({ behavior: 'smooth', block: 'start' }), 50);

    } catch (e) {
      showError('通信エラーが発生しました。サーバーが起動しているか確認してください。');
    } finally {
      btn.classList.remove('loading');
      btn.disabled = false;
    }
  }

  // ── コピー ──
  async function copyReview() {
    const title = document.getElementById('resultTitle').textContent;
    const body  = document.getElementById('resultBody').textContent;
    const text  = `${title}\n\n${body}`;
    const btn   = document.getElementById('copyBtn');

    try {
      await navigator.clipboard.writeText(text);
      btn.textContent = '✅ コピーしました';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = '📋 コピー';
        btn.classList.remove('copied');
      }, 2500);
    } catch {
      // フォールバック（古いブラウザ）
      const ta = document.createElement('textarea');
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      btn.textContent = '✅ コピーしました';
    }
  }

  // ── エラー表示 ──
  function showError(msg) {
    const box = document.getElementById('errorBox');
    box.textContent = '⚠️ ' + msg;
    box.classList.add('show');
  }

  // ── Enterキーで生成（PCのみ） ──
  document.getElementById('productName').addEventListener('keydown', e => {
    if (e.key === 'Enter') generateReview();
  });
</script>

</body>
</html>
